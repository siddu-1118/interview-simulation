<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ULTIMATE VR VFX EXPERIENCE</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

  <!-- Particle System -->
  <script src="https://cdn.jsdelivr.net/npm/aframe-particle-system-component@1.1.4/dist/aframe-particle-system-component.min.js"></script>

  <style>
    body { margin: 0; }
  </style>

  <script>
    /* 🤖 INTERACTIVE CLICK VFX */
    AFRAME.registerComponent("click-explosion", {
      init: function () {
        this.el.addEventListener("click", () => {
          const explosion = document.createElement("a-entity");
          explosion.setAttribute("particle-system", {
            preset: "default",
            particleCount: 3000,
            size: 0.4,
            color: "#ff0044, #ffff00",
            velocityValue: "3 6 3"
          });
          explosion.setAttribute("position", this.el.getAttribute("position"));
          this.el.sceneEl.appendChild(explosion);

          setTimeout(() => explosion.remove(), 1500);
        });
      }
    });
  </script>
</head>

<body>
<a-scene fog="type: exponential; color: #000014; density: 0.02">

  <!-- 🌠 REAL GALAXY SKY -->
  <a-sky
    src="https://cdn.aframe.io/360-image-gallery-boilerplate/img/sechelt.jpg"
    rotation="0 -90 0">
  </a-sky>

  <!-- 🌊 WATER SHADER -->
  <a-plane
    position="0 0 -10"
    rotation="-90 0 0"
    width="100"
    height="100"
    material="
      color: #0044ff;
      metalness: 0.3;
      roughness: 0.2;"
    animation="
      property: material.color;
      dir: alternate;
      dur: 2000;
      loop: true;
      to: #0011aa">
  </a-plane>

  <!-- 💡 LIGHTS -->
  <a-entity light="type: ambient; intensity: 0.4"></a-entity>
  <a-entity light="type: point; color: #00ffff; intensity: 3" position="0 6 -5"></a-entity>
  <a-entity light="type: point; color: #ff00ff; intensity: 2" position="5 4 -8"></a-entity>

  <!-- 🌈 NEON CYBER CITY -->
  <a-box position="-6 3 -12" width="2" height="6" depth="2"
         material="emissive: #00ffff; emissiveIntensity: 2"></a-box>
  <a-box position="-3 4 -14" width="3" height="8" depth="2"
         material="emissive: #ff00ff; emissiveIntensity: 2"></a-box>
  <a-box position="3 5 -13" width="2.5" height="10" depth="2"
         material="emissive: #00ff88; emissiveIntensity: 2"></a-box>
  <a-box position="6 3 -11" width="2" height="6" depth="2"
         material="emissive: #ffaa00; emissiveIntensity: 2"></a-box>

  <!-- 🤖 BOSS CHARACTER -->
  <a-sphere id="boss"
            position="0 3 -7"
            radius="1.2"
            material="color: #ff0033; emissive: #ff0033; emissiveIntensity: 1"
            animation="property: position; dir: alternate; dur: 1500; loop: true; to: 0 4 -7"
            click-explosion>
  </a-sphere>

  <!-- ⚡ BOSS ENERGY AURA -->
  <a-entity position="0 3 -7"
    particle-system="
      preset: dust;
      particleCount: 3000;
      size: 0.4;
      color: #ff0033, #ffff00;
      velocityValue: 0 1 0;">
  </a-entity>

  <!-- 🎮 ENERGY BEAM ATTACK -->
  <a-cylinder position="0 3 -6"
              radius="0.15"
              height="6"
              rotation="90 0 0"
              material="emissive: #ff0000; emissiveIntensity: 3"
              animation="property: scale; dir: alternate; dur: 800; loop: true; to: 1 1 1.5">
  </a-cylinder>

  <!-- 🔥 FIRE ZONES -->
  <a-entity position="-4 0 -6"
    particle-system="
      preset: fire;
      particleCount: 4000;
      size: 1.4;
      color: #ff4400, #ffaa00;">
  </a-entity>

  <a-entity position="4 0 -6"
    particle-system="
      preset: fire;
      particleCount: 4000;
      size: 1.4;
      color: #00aaff, #00ffff;">
  </a-entity>

  <!-- 🌀 PORTAL -->
  <a-torus position="0 2 -12"
           radius="2.5"
           radius-tubular="0.25"
           material="emissive: #7700ff; emissiveIntensity: 3"
           animation="property: rotation; to: 0 360 0; dur: 3000; loop: true">
  </a-torus>

  <!-- ✨ INTERACTIVE MAGIC ORBS -->
  <a-sphere position="-2 2 -4" radius="0.3"
            material="emissive: #00ffff"
            click-explosion></a-sphere>

  <a-sphere position="2 2 -4" radius="0.3"
            material="emissive: #ff00ff"
            click-explosion></a-sphere>

  <!-- 🎥 CAMERA -->
  <a-entity position="0 1.6 5">
    <a-camera>
      <a-cursor color="#00ffff"></a-cursor>
    </a-camera>
  </a-entity>

</a-scene>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Young Innovators STEM Lab - VR Interview</title>
    <!-- A-Frame for 3D/VR -->
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: #000;
            color: white;
            overflow: hidden;
        }

        /* Branding */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .brand {
            position: absolute;
            top: 2rem;
            left: 2rem;
        }

        .brand h1 {
            margin: 0;
            font-size: 2rem;
            color: white;
            font-weight: 800;
            letter-spacing: -1px;
        }

        /* Interface Overlay */
        #interface {
            position: absolute;
            bottom: 5rem;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 650px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            pointer-events: auto;
            display: none;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
        }

        h2 {
            font-weight: 400;
            margin-top: 0;
            line-height: 1.4;
            font-size: 1.4rem;
            color: #fff;
        }

        .answers {
            display: grid;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 1.2rem;
            border-radius: 12px;
            text-align: left;
            font-family: inherit;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.02);
            border-color: white;
        }

        /* Summary */
        #summary {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.9);
            padding: 3.5rem;
            border-radius: 25px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: none;
            pointer-events: auto;
        }

        .score {
            font-size: 3.5rem;
            font-weight: 800;
            color: #4facfe;
            margin: 1.5rem 0;
        }

        .start-btn {
            background: white;
            color: black;
            font-weight: 800;
            border: none;
            padding: 1.2rem 2.5rem;
            font-size: 1.3rem;
            margin-top: 2rem;
            border-radius: 50px;
            text-shadow: none;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .start-btn:hover {
            background: #eee;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div id="ui-layer">
        <div class="brand">
            <h1>YISL VR INTERVIEW</h1>
        </div>

        <div id="start-screen"
            style="position: absolute; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:auto; text-align:center;">
            <button class="start-btn" onclick="startInterview()">ENTER VR LAB</button>
        </div>

        <div id="interface">
            <h2 id="question-text">Loading...</h2>
            <div id="answers-list" class="answers"></div>
        </div>

        <div id="summary">
            <h2>Session Complete</h2>
            <div class="score" id="final-score">0 / 0</div>
            <button class="start-btn" onclick="location.reload()">RETRY SESSION</button>
        </div>
    </div>

    <!-- A-Frame Scene (Based on User's ar.html) -->
    <a-scene embedded vr-mode-ui="enabled: true">
        <!-- Environment from ar.html -->
        <a-sky color="purple"></a-sky>
        <a-box position="-1 -0.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box>
        <a-sphere position="0 0.25 -5" radius="1.25" color="#EF2D5E"></a-sphere>
        <a-cylinder position="1 -0.25 -3" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder>
        <a-plane position="0 -1 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4"></a-plane>

        <a-image src="https://raw.githubusercontent.com/alluringxstalwart/SourceYISL/main/Landscape.png"
            position="0 5 -10" width="25" height="7.5"></a-image>

        <a-text value="Young Innovators STEM Lab" position="0 9.5 -10" align="center" color="white" font="mozillavr"
            width="10" height="5" anchor="center">
        </a-text>

        <!-- The Interviewer Entity -->
        <a-entity id="interviewer" position="0 -1 -3.5">
            <!-- Body -->
            <a-capsule position="0 1 0" radius="0.35" height="1.2" color="#2c3e50"></a-capsule>
            <!-- Head -->
            <a-entity id="head-group" position="0 1.8 0">
                <a-sphere radius="0.25" color="#ebc3a0"></a-sphere>
                <a-sphere radius="0.26" color="#2d1c0b" theta-length="90" position="0 0.05 0"></a-sphere>
                <a-sphere id="mouth-glow" radius="0.02" color="#00f2fe" position="0 -0.1 0.24"
                    visible="false"></a-sphere>
            </a-entity>
        </a-entity>

        <a-camera position="0 1.6 0"></a-camera>
    </a-scene>

    <script>
        const questions = [
            {
                text: "Welcome to the Lab! How excited are you to start your VR journey?",
                answers: [
                    { text: "Extremely! I love new tech.", score: 10 },
                    { text: "I'm curious but careful.", score: 7 },
                    { text: "Just observing for now.", score: 5 }
                ]
            },
            {
                text: "Which STEM field interests you the most?",
                answers: [
                    { text: "Robotics and AI.", score: 10 },
                    { text: "Space Exploration.", score: 10 },
                    { text: "Virtual Reality Dev.", score: 10 }
                ]
            }
        ];

        let index = 0;
        let totalScore = 0;

        function startInterview() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('interface').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            const q = questions[index];
            document.getElementById('question-text').innerText = q.text;
            const list = document.getElementById('answers-list');
            list.innerHTML = '';

            q.answers.forEach(a => {
                const btn = document.createElement('button');
                btn.innerText = a.text;
                btn.onclick = () => handleAnswer(a);
                list.appendChild(btn);
            });
        }

        function handleAnswer(answer) {
            totalScore += answer.score;

            // Visual feedback
            const glow = document.getElementById('mouth-glow');
            glow.setAttribute('visible', 'true');

            document.getElementById('interface').style.opacity = '0.4';
            document.getElementById('interface').style.pointerEvents = 'none';

            setTimeout(() => {
                glow.setAttribute('visible', 'false');
                document.getElementById('interface').style.opacity = '1';
                document.getElementById('interface').style.pointerEvents = 'auto';

                index++;
                if (index < questions.length) {
                    showQuestion();
                } else {
                    finishInterview();
                }
            }, 1200);
        }

        function finishInterview() {
            document.getElementById('interface').style.display = 'none';
            document.getElementById('summary').style.display = 'block';
            document.getElementById('final-score').innerText = totalScore + " / " + (questions.length * 10);
        }
    </script>
</body>

</html>
